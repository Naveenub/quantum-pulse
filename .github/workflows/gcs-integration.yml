name: GCS Integration Tests

on:
  push:
    branches: [main, develop]
    paths:
      - "core/storage_gcs.py"
      - "core/db.py"
      - "tests/test_gcs_integration.py"
      - ".github/workflows/gcs-integration.yml"
  pull_request:
    branches: [main]
    paths:
      - "core/storage_gcs.py"
      - "core/db.py"
      - "tests/test_gcs_integration.py"
      - ".github/workflows/gcs-integration.yml"
  workflow_dispatch:

env:
  QUANTUM_PASSPHRASE: ci-test-passphrase-16-chars-minimum
  QUANTUM_ENVIRONMENT: development
  PYTHON_VERSION: "3.12"
  GCS_ENDPOINT_URL: http://localhost:4443
  GCS_TEST_BUCKET: quantum-pulse-test
  STORAGE_EMULATOR_HOST: localhost:4443

jobs:
  gcs-integration:
    name: GCS Integration Tests (fake-gcs-server)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install gcloud-aio-storage aiohttp

      # Run fake-gcs-server as a background docker container so we control
      # the startup flags (HTTP mode, correct port, public-host).
      # Service containers do not support CMD overrides, so we use docker run.
      - name: Start fake-gcs-server
        run: |
          docker run -d \
            --name fake-gcs \
            -p 4443:4443 \
            fsouza/fake-gcs-server:latest \
            -scheme http \
            -port 4443 \
            -public-host localhost:4443

      - name: Wait for fake-gcs-server
        run: |
          echo "Waiting for fake-gcs-server..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4443/storage/v1/b > /dev/null 2>&1; then
              echo "fake-gcs-server ready"
              break
            fi
            echo "Attempt $i — waiting 3s..."
            sleep 3
          done
          curl -sf http://localhost:4443/storage/v1/b || (docker logs fake-gcs && exit 1)

      - name: Create test bucket
        run: |
          curl -sf -X POST http://localhost:4443/storage/v1/b \
            -H "Content-Type: application/json" \
            -d '{"name": "quantum-pulse-test"}' \
            || echo "Bucket may already exist"

      - name: Run GCS integration tests
        run: |
          pytest tests/test_gcs_integration.py -v \
            --asyncio-mode=auto \
            --no-cov \
            --tb=short \
            -x
        env:
          GCS_ENDPOINT_URL: http://localhost:4443
          GCS_TEST_BUCKET: quantum-pulse-test
          STORAGE_EMULATOR_HOST: localhost:4443

      - name: Dump fake-gcs logs on failure
        if: failure()
        run: docker logs fake-gcs
