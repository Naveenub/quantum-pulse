name: GCS Integration Tests

# Runs on push/PR to main when GCS-related files change.
# Separate from main CI so a fake-gcs-server issue doesn't block merges.
on:
  push:
    branches: [main, develop]
    paths:
      - "core/storage_gcs.py"
      - "core/db.py"
      - "tests/test_gcs_integration.py"
      - ".github/workflows/gcs-integration.yml"
  pull_request:
    branches: [main]
    paths:
      - "core/storage_gcs.py"
      - "core/db.py"
      - "tests/test_gcs_integration.py"
      - ".github/workflows/gcs-integration.yml"
  workflow_dispatch:

env:
  QUANTUM_PASSPHRASE: ci-test-passphrase-16-chars-minimum
  QUANTUM_ENVIRONMENT: development
  PYTHON_VERSION: "3.12"
  GCS_ENDPOINT_URL: http://localhost:4443
  GCS_TEST_BUCKET: quantum-pulse-test
  # fake-gcs-server needs STORAGE_EMULATOR_HOST without scheme
  STORAGE_EMULATOR_HOST: localhost:4443

jobs:
  gcs-integration:
    name: GCS Integration Tests (fake-gcs-server)
    runs-on: ubuntu-latest

    services:
      fake-gcs:
        image: fsouza/fake-gcs-server:latest
        ports:
          - "4443:4443"
        options: >-
          --health-cmd "curl -sf http://localhost:4443/storage/v1/b"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
        # Run in HTTP mode on port 4443 with public-host for correct URLs
        env:
          # Passed via command args below — service containers don't support CMD override
          # so we use the entrypoint env vars supported by fake-gcs-server
          PORT: "4443"
          SCHEME: "http"
          PUBLIC_HOST: "localhost:4443"

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install gcloud-aio-storage aiohttp

      - name: Wait for fake-gcs-server
        run: |
          echo "Waiting for fake-gcs-server..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4443/storage/v1/b > /dev/null 2>&1; then
              echo "fake-gcs-server ready"
              break
            fi
            echo "Attempt $i — waiting 3s..."
            sleep 3
          done

      - name: Create test bucket
        run: |
          curl -sf -X POST http://localhost:4443/storage/v1/b \
            -H "Content-Type: application/json" \
            -d '{"name": "quantum-pulse-test"}' \
            || echo "Bucket may already exist"

      - name: Run GCS integration tests
        run: |
          pytest tests/test_gcs_integration.py -v \
            --asyncio-mode=auto \
            --no-cov \
            --tb=short \
            -x
        env:
          GCS_ENDPOINT_URL: http://localhost:4443
          GCS_TEST_BUCKET: quantum-pulse-test
          STORAGE_EMULATOR_HOST: localhost:4443
