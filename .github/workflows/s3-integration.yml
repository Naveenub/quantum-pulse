name: S3 Integration Tests

# Runs on push/PR to main — separate job from the main CI so a LocalStack
# timeout doesn't block lint/unit-tests from merging.
on:
  push:
    branches: [main, develop]
    paths:
      - "core/storage_s3.py"
      - "core/db.py"
      - "tests/test_s3_integration.py"
      - ".github/workflows/s3-integration.yml"
  pull_request:
    branches: [main]
    paths:
      - "core/storage_s3.py"
      - "core/db.py"
      - "tests/test_s3_integration.py"
      - ".github/workflows/s3-integration.yml"
  # Allow manual trigger for debugging
  workflow_dispatch:

env:
  QUANTUM_PASSPHRASE: ci-test-passphrase-16-chars-minimum
  QUANTUM_ENVIRONMENT: development
  PYTHON_VERSION: "3.12"
  # LocalStack S3 endpoint
  S3_ENDPOINT_URL: http://localhost:4566
  S3_TEST_BUCKET: quantum-pulse-test
  AWS_ACCESS_KEY_ID: test
  AWS_SECRET_ACCESS_KEY: test
  AWS_DEFAULT_REGION: us-east-1

jobs:
  s3-integration:
    name: S3 Integration Tests (LocalStack)
    runs-on: ubuntu-latest

    services:
      localstack:
        image: localstack/localstack:latest
        ports:
          - "4566:4566"
        env:
          SERVICES: s3
          DEFAULT_REGION: us-east-1
          DEBUG: 0
        options: >-
          --health-cmd "curl -sf http://localhost:4566/_localstack/health | grep -q '\"s3\"'"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install aioboto3

      - name: Wait for LocalStack S3
        run: |
          echo "Waiting for LocalStack S3..."
          for i in $(seq 1 20); do
            if curl -sf http://localhost:4566/_localstack/health | grep -q '"s3"'; then
              echo "LocalStack S3 ready"
              break
            fi
            echo "Attempt $i — waiting 3s..."
            sleep 3
          done

      - name: Create test bucket
        run: |
          pip install awscli
          aws --endpoint-url=http://localhost:4566 \
              --region us-east-1 \
              s3 mb s3://quantum-pulse-test || true

      - name: Run S3 integration tests
        run: |
          pytest tests/test_s3_integration.py -v \
            --asyncio-mode=auto \
            --no-cov \
            --tb=short \
            -x
